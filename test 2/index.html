<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Об'єкт Date, setTimeout, setInterval Урок №11</title>
</head>

<body>
    <div class="time">
        <div class="time-date">00.00.0000</div>
        <div class="time-time">00:00:00</div>
    </div>

    <div class="stopwatch">
        <div class="stopwatch-timer">
            <p class="stopwatch-timer-display">00:00:00:00</p>
            <div class="stopwatch-button">
                <button id="start">start</button>
                <button id="loop">loop</button>
                <button id="stop">stop</button>
                <button id="reset">reset</button>
            </div>
        </div>
        <div class="stopwatch-screen"></div>
    </div>

    <div class="timer">
        <div class="timer-watch">
            <p class="timer-watch-text">00</p>
            <p class="timer-watch-text1">MINUTES</p>
            <div class="timer-watch-btn">
                <button id="plus">+</button>
                <button id="minus">-</button>
            </div>
        </div>
        <div class="timer-display">
            <p class="timer-display-text">00:00</p>
            <div class="timer-display-btn">
                <button id="timer-start">start</button>
                <button id="timer-stop">stop</button>
                <button id="timer-reset">reset</button>
            </div>
        </div>
    </div>
</body>

<script src="script.js"></script>

</html>
